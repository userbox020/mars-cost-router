<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Fixed v1.2 descriptive token composition and checks panel</title>
  <desc id="desc">A neutral stacked-bar comparison of child and root tokens for a selective Terra and Sol policy and an all-Sol high baseline. A separate panel shows 12 of 12 deterministic checks for each treatment. The root difference is confounded and the checks do not establish quality equivalence.</desc>
  <rect width="1200" height="750" rx="24" fill="#F8F4EC"/>
  <g font-family="Arial, sans-serif" fill="#17212B">
    <text x="65" y="64" font-family="Georgia, serif" font-size="30" font-weight="700">Fixed v1.2 · descriptive record</text>
    <text x="65" y="106" font-size="25" font-weight="700" fill="#6B4050">Descriptive only — root difference is confounded; 12/12 is not quality equivalence.</text>
    <text x="65" y="136" font-size="16" fill="#52667B">Three precommitted pairs · synthetic read-only tasks · Codex CLI 0.144.5 · order- and cache-confounded</text>
  </g>
  <rect x="65" y="170" width="750" height="470" rx="16" fill="#FCFAF5" stroke="#D7D0C4" stroke-width="2"/>
  <text x="95" y="210" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#17212B">Token composition</text>
  <g font-family="Arial, sans-serif" fill="#17212B"><rect x="470" y="192" width="16" height="16" rx="3" fill="#91A5B3"/><text x="495" y="206" font-size="15">Child tokens</text><rect x="620" y="192" width="16" height="16" rx="3" fill="#9B7B73"/><text x="645" y="206" font-size="15">Root tokens</text></g>
  <g stroke="#D8DDE0" stroke-width="2"><path d="M135 545H760"/><path d="M135 455H760"/><path d="M135 365H760"/><path d="M135 275H760"/></g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#52667B"><text x="88" y="550">0</text><text x="70" y="460">200k</text><text x="70" y="370">400k</text><text x="70" y="280">600k</text></g>
  <rect x="245" y="385" width="170" height="160" rx="5" fill="#91A5B3"/><rect x="245" y="217" width="170" height="168" rx="5" fill="#9B7B73"/>
  <rect x="555" y="385" width="170" height="160" rx="5" fill="#91A5B3"/><rect x="555" y="199" width="170" height="186" rx="5" fill="#9B7B73"/>
  <g font-family="Arial, sans-serif" text-anchor="middle"><text x="330" y="305" font-size="16" font-weight="700" fill="#F8F4EC">Root · 372,590</text><text x="330" y="470" font-size="16" font-weight="700" fill="#17212B">Child · 356,116</text><text x="640" y="295" font-size="16" font-weight="700" fill="#F8F4EC">Root · 412,418</text><text x="640" y="470" font-size="16" font-weight="700" fill="#17212B">Child · 356,494</text><text x="330" y="578" font-size="16" font-weight="700" fill="#17212B">Selective Terra/Sol</text><text x="640" y="578" font-size="16" font-weight="700" fill="#17212B">All-Sol/high baseline</text><text x="330" y="606" font-size="15" fill="#52667B">Total · 728,706</text><text x="640" y="606" font-size="15" fill="#52667B">Total · 768,912</text></g>
  <rect x="845" y="170" width="290" height="470" rx="16" fill="#EEEAE4" stroke="#C9C1B7" stroke-width="2"/>
  <g font-family="Arial, sans-serif" fill="#17212B"><text x="875" y="215" font-size="21" font-weight="700">Checks panel</text><text x="875" y="250" font-size="15" fill="#52667B">Deterministic checks</text><text x="875" y="295" font-size="31" font-weight="700">12 / 12</text><text x="875" y="323" font-size="15">Selective Terra/Sol</text><path d="M875 345H1105" stroke="#C9C1B7" stroke-width="2"/><text x="875" y="387" font-size="31" font-weight="700">12 / 12</text><text x="875" y="415" font-size="15">All-Sol/high baseline</text><path d="M875 438H1105" stroke="#C9C1B7" stroke-width="2"/><text x="875" y="480" font-size="15" fill="#52667B">Observed retries</text><text x="1085" y="480" font-size="18" font-weight="700" text-anchor="end">0 / 0</text><text x="875" y="520" font-size="15" fill="#52667B">Observed reroutes</text><text x="1085" y="520" font-size="18" font-weight="700" text-anchor="end">0 / 0</text><text x="875" y="580" font-size="14" fill="#6B4050">Checks are not a quality</text><text x="875" y="602" font-size="14" fill="#6B4050">equivalence result.</text></g>
  <rect x="65" y="670" width="1070" height="1" fill="#9B7B73"/><text x="65" y="696" font-family="Arial, sans-serif" font-size="16" fill="#17212B">Child totals nearly flat: -0.11% recorded. Most recorded total difference occurred at root.</text><text x="65" y="724" font-family="Arial, sans-serif" font-size="14" fill="#52667B">Source: sanitized public-evidence/fixed-v1.2-summary.json · not causal, quality, cost, billing, or savings proof.</text>
