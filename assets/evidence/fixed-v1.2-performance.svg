<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Fixed v1.2 descriptive token composition and checks panel</title>
  <desc id="desc">A neutral stacked-bar comparison of child and root tokens for a selective Terra and Sol policy and an all-Sol high baseline. A separate panel shows 12 of 12 deterministic checks for each treatment.</desc>
  <rect width="1200" height="750" rx="24" fill="#F8F4EC"/>
  <g font-family="Arial, sans-serif" fill="#17212B">
    <text x="65" y="64" font-family="Georgia, serif" font-size="30" font-weight="700">Fixed v1.2 · descriptive record</text>
    <text x="65" y="102" font-size="16" fill="#52667B">Three precommitted pairs · synthetic read-only tasks · Codex CLI 0.144.5 · order- and cache-confounded</text>
  </g>
  <rect x="65" y="125" width="750" height="515" rx="16" fill="#FCFAF5" stroke="#D7D0C4" stroke-width="2"/>
  <text x="95" y="165" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#17212B">Token composition</text>
  <g font-family="Arial, sans-serif" fill="#17212B">
    <rect x="465" y="148" width="16" height="16" rx="3" fill="#91A5B3"/><text x="490" y="162" font-size="15">Child tokens</text>
    <rect x="635" y="148" width="16" height="16" rx="3" fill="#9B7B73"/><text x="660" y="162" font-size="15">Root tokens</text>
  </g>
  <g stroke="#D8DDE0" stroke-width="2"><path d="M135 540H760"/><path d="M135 448H760"/><path d="M135 356H760"/><path d="M135 264H760"/></g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#52667B"><text x="88" y="545">0</text><text x="70" y="453">200k</text><text x="70" y="361">400k</text><text x="70" y="269">600k</text></g>
  <rect x="245" y="376" width="170" height="164" rx="5" fill="#91A5B3"/><rect x="245" y="205" width="170" height="171" rx="5" fill="#9B7B73"/>
  <rect x="555" y="376" width="170" height="164" rx="5" fill="#91A5B3"/><rect x="555" y="186" width="170" height="190" rx="5" fill="#9B7B73"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="330" y="294" font-size="16" font-weight="700" fill="#F8F4EC">Root · 372,590</text><text x="330" y="462" font-size="16" font-weight="700" fill="#17212B">Child · 356,116</text>
    <text x="640" y="284" font-size="16" font-weight="700" fill="#F8F4EC">Root · 412,418</text><text x="640" y="462" font-size="16" font-weight="700" fill="#17212B">Child · 356,494</text>
    <text x="330" y="576" font-size="16" font-weight="700" fill="#17212B">Selective Terra/Sol</text><text x="640" y="576" font-size="16" font-weight="700" fill="#17212B">All-Sol/high baseline</text>
    <text x="330" y="604" font-size="15" fill="#52667B">Total · 728,706</text><text x="640" y="604" font-size="15" fill="#52667B">Total · 768,912</text>
  </g>
  <rect x="845" y="125" width="290" height="515" rx="16" fill="#EEEAE4" stroke="#C9C1B7" stroke-width="2"/>
  <g font-family="Arial, sans-serif" fill="#17212B">
    <text x="875" y="170" font-size="21" font-weight="700">Checks panel</text><text x="875" y="205" font-size="15" fill="#52667B">Deterministic checks</text>
    <text x="875" y="250" font-size="31" font-weight="700">12 / 12</text><text x="875" y="278" font-size="15">Selective Terra/Sol</text><path d="M875 300H1105" stroke="#C9C1B7" stroke-width="2"/>
    <text x="875" y="342" font-size="31" font-weight="700">12 / 12</text><text x="875" y="370" font-size="15">All-Sol/high baseline</text><path d="M875 393H1105" stroke="#C9C1B7" stroke-width="2"/>
    <text x="875" y="435" font-size="15" fill="#52667B">Observed retries</text><text x="1085" y="435" font-size="18" font-weight="700" text-anchor="end">0 / 0</text>
    <text x="875" y="475" font-size="15" fill="#52667B">Observed reroutes</text><text x="1085" y="475" font-size="18" font-weight="700" text-anchor="end">0 / 0</text>
  </g>
  <rect x="65" y="670" width="1070" height="1" fill="#9B7B73"/>
  <text x="65" y="696" font-family="Arial, sans-serif" font-size="16" fill="#17212B">Child totals nearly flat: -0.11% recorded. Most recorded total difference occurred at root.</text>
  <text x="65" y="724" font-family="Arial, sans-serif" font-size="14" fill="#52667B">Source: sanitized public-evidence/fixed-v1.2-summary.json</text>
</svg>
